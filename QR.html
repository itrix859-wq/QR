<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("qrTheme") === "dark" ? "dark" : "light";
  </script>
  <style>
    :root {
      --page-background: #f7f7f4;
      --logo-color: #000000;
      --logo-filter: none;
      --ai-logo-color: #000000;
      --divider-color: rgba(0, 0, 0, 0.32);
      --beta-color: rgba(90, 90, 90, 0.48);
      --inverse-surface: #050505;
      --inverse-text: #ffffff;
      --inverse-muted: rgba(255, 255, 255, 0.54);
      --auth-surface: rgba(255, 255, 255, 0.96);
      --auth-text: #050505;
      --auth-muted: rgba(5, 5, 5, 0.42);
      --auth-border: rgba(5, 5, 5, 0.18);
      --auth-field: rgba(255, 255, 255, 0.82);
      --auth-primary: #050505;
      --auth-primary-text: #ffffff;
      --theme-duration: 760ms;
      font-family: Arial, "Segoe UI", sans-serif;
    }

    :root[data-theme="dark"] {
      --page-background: #050505;
      --logo-color: #ffffff;
      --logo-filter: invert(1);
      --ai-logo-color: #ffffff;
      --divider-color: rgba(255, 255, 255, 0.42);
      --beta-color: rgba(190, 190, 190, 0.5);
      --inverse-surface: #f7f7f4;
      --inverse-text: #050505;
      --inverse-muted: rgba(5, 5, 5, 0.54);
      --auth-surface: rgba(5, 5, 5, 0.96);
      --auth-text: #ffffff;
      --auth-muted: rgba(255, 255, 255, 0.5);
      --auth-border: rgba(255, 255, 255, 0.22);
      --auth-field: rgba(255, 255, 255, 0.06);
      --auth-primary: #ffffff;
      --auth-primary-text: #050505;
    }

    * {
      box-sizing: border-box;
    }


    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background-color: var(--page-background);
      transition: background-color var(--theme-duration) ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem clamp(1rem, 3vw, 2rem) 0.9rem 0.35rem;
      background-color: var(--page-background);
      transition: background-color var(--theme-duration) ease;
      pointer-events: none;
      direction: ltr;
    }

    .site-header::after {
      position: absolute;
      right: 0;
      bottom: 0.34rem;
      left: 0.35rem;
      z-index: 3;
      height: 1px;
      content: "";
      background: var(--divider-color);
      transform-origin: left center;
      transition: background-color var(--theme-duration) ease;
    }

    .beta-version {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 4;
      color: var(--beta-color);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1;
      text-align: center;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      transition: color var(--theme-duration) ease;
    }

    .logo-link,
    .ai-logo-button,
    .settings-icon-button,
    .login-icon-button,
    .theme-toggle {
      pointer-events: auto;
    }

    .brand-cluster,
    .theme-toggle {
      position: relative;
      z-index: 4;
    }

    .brand-cluster {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      pointer-events: auto;
    }

    .logo-link {
      display: inline-flex;
      width: clamp(4.35rem, 9vw, 5.9rem);
      height: clamp(2.1rem, 4.4vw, 2.9rem);
      color: var(--logo-color);
      text-decoration: none;
      transform-origin: center;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .logo-link:hover {
      opacity: 0.78;
      transform: translateX(-1px);
    }

    .logo-link.is-spinning {
      animation: logo-spin-bounce 880ms cubic-bezier(0.2, 1.3, 0.36, 1) both;
    }

    .ai-logo-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(2.3rem, 5.2vw, 3rem);
      height: clamp(2.3rem, 5.2vw, 3rem);
      padding: 0;
      color: var(--ai-logo-color);
      background: transparent;
      border: 0;
      cursor: pointer;
      transform-origin: center;
      transition: opacity 180ms ease, transform 220ms ease;
    }

    .ai-logo-button:hover {
      opacity: 0.76;
      transform: translateY(-1px);
    }

    .ai-logo-button:active,
    .ai-logo-button.is-active {
      transform: translateY(1px) scale(0.94);
    }

    .ai-logo-button:disabled {
      cursor: default;
      opacity: 0.62;
    }

    .settings-icon-button,
    .login-icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(2.1rem, 4.8vw, 2.8rem);
      height: clamp(2.1rem, 4.8vw, 2.8rem);
      padding: 0;
      color: #18b957;
      background: transparent;
      border: 0;
      cursor: pointer;
      transform-origin: center;
      transition: opacity 180ms ease, transform 220ms ease;
    }

    .settings-icon-button {
      color: #a3a3a3;
    }

    .login-icon-button {
      color: #18b957;
    }

    .settings-icon-button:hover,
    .login-icon-button:hover {
      opacity: 0.78;
      transform: translateY(-1px);
    }

    .settings-icon-button:active,
    .login-icon-button:active {
      transform: translateY(1px) scale(0.94);
    }

    .login-icon-button.is-logged-in {
      color: #a3a3a3;
    }

    .header-icon,
    .login-icon {
      display: block;
      width: 78%;
      height: 78%;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .logo-mark {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--logo-color);
      mask: url("photos/logo.png") center / contain no-repeat;
      -webkit-mask: url("photos/logo.png") center / contain no-repeat;
    }

    .logo-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: var(--logo-filter);
      transition: filter var(--theme-duration) ease;
    }

    .ai-logo-mark {
      position: relative;
      display: inline-block;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .ai-logo-mark::before {
      position: absolute;
      inset: 0;
      content: "";
      background: var(--ai-logo-color);
      filter:
        drop-shadow(0 0 0 #7f8790)
        drop-shadow(0 0 0.08rem rgba(90, 98, 108, 0.82))
        drop-shadow(0 0.12rem 0.18rem rgba(0, 0, 0, 0.14));
      mask: url("photos/AiLogo.png") center / contain no-repeat;
      -webkit-mask: url("photos/AiLogo.png") center / contain no-repeat;
      transition: background-color var(--theme-duration) ease;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      width: 6.25rem;
      height: 3rem;
      padding: 0 0.85rem;
      border: 1.5px solid currentColor;
      border-radius: 0.72rem;
      font: 700 1rem/1 Arial, "Segoe UI", sans-serif;
      letter-spacing: 0;
      cursor: pointer;
      transform-origin: center;
      transition:
        transform 220ms ease,
        box-shadow var(--theme-duration) ease,
        background-color var(--theme-duration) ease,
        color var(--theme-duration) ease,
        border-color var(--theme-duration) ease;
      direction: ltr;
    }

    .theme-toggle[data-mode="dark"] {
      color: #000000;
      background: #ffffff;
      box-shadow: 0 0.45rem 1.25rem rgba(0, 0, 0, 0.08);
    }

    .theme-toggle[data-mode="sun"] {
      color: #ffffff;
      background: #050505;
      box-shadow: 0 0.45rem 1.25rem rgba(255, 255, 255, 0.08);
    }

    .theme-toggle:hover:not(:disabled) {
      transform: rotate(-4deg) translateX(-0.12rem);
    }

    .theme-toggle:active:not(:disabled),
    .theme-toggle.is-pressed {
      transform: rotate(-4deg) translateX(-0.12rem) translateY(0.1rem) scale(0.94);
      box-shadow: none;
    }

    .theme-toggle:disabled {
      cursor: default;
    }

    .theme-icon {
      position: relative;
      flex: 0 0 1.08rem;
      width: 1.08rem;
      height: 1.08rem;
      color: currentColor;
    }

    .theme-toggle[data-mode="dark"] .theme-icon::before,
    .theme-toggle[data-mode="dark"] .theme-icon::after {
      position: absolute;
      content: "";
      border-radius: 50%;
    }

    .theme-toggle[data-mode="dark"] .theme-icon::before {
      inset: 0;
      background: currentColor;
    }

    .theme-toggle[data-mode="dark"] .theme-icon::after {
      top: -0.08rem;
      left: 0.38rem;
      width: 0.98rem;
      height: 0.98rem;
      background: #ffffff;
    }

    .theme-toggle[data-mode="sun"] .theme-icon::before {
      position: absolute;
      inset: 0.34rem;
      content: "";
      background: currentColor;
      border-radius: 50%;
    }

    .theme-toggle[data-mode="sun"] .theme-icon::after {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0.12rem;
      height: 0.22rem;
      margin: -0.55rem 0 0 -0.06rem;
      content: "";
      background: currentColor;
      border-radius: 99px;
      box-shadow:
        0 0.88rem 0 currentColor,
        0.43rem 0.12rem 0 currentColor,
        -0.43rem 0.12rem 0 currentColor,
        0.31rem 0.74rem 0 currentColor,
        -0.31rem 0.74rem 0 currentColor;
    }

    .theme-text {
      min-width: 2.25rem;
      text-align: left;
    }

    .theme-toggle[data-mode="dark"] .theme-text {
      color: #ffffff;
      text-shadow:
        -1px -1px 0 #000000,
        1px -1px 0 #000000,
        -1px 1px 0 #000000,
        1px 1px 0 #000000;
    }

    .theme-toggle[data-mode="sun"] .theme-text {
      color: #ffffff;
      text-shadow: none;
    }

    main {
      position: relative;
      z-index: 20;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 5.85rem 1rem 2rem;
    }

    .link-box {
      width: min(100%, 36rem);
      direction: ltr;
      text-align: left;
    }

    .link-label {
      display: block;
      margin: 0 0 0.55rem;
      color: var(--beta-color);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0;
      transition:
        opacity 560ms ease,
        transform 560ms cubic-bezier(0.22, 1, 0.36, 1),
        color var(--theme-duration) ease;
    }

    .link-row {
      display: flex;
      align-items: center;
      width: 100%;
      height: 3.1rem;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #000000;
      border-radius: 0.9rem;
      box-shadow: 0 0.7rem 1.7rem rgba(0, 0, 0, 0.08);
      transition:
        opacity 560ms ease,
        transform 560ms cubic-bezier(0.22, 1, 0.36, 1),
        background-color var(--theme-duration) ease,
        border-color var(--theme-duration) ease,
        box-shadow var(--theme-duration) ease;
    }

    .link-input {
      min-width: 0;
      flex: 1;
      height: 100%;
      padding: 0 0.95rem;
      color: #000000;
      background: #ffffff;
      border: 0;
      outline: none;
      font: 600 0.98rem/1 Arial, "Segoe UI", sans-serif;
      letter-spacing: 0;
      transition:
        color var(--theme-duration) ease,
        background-color var(--theme-duration) ease;
    }

    .link-input::placeholder {
      color: rgba(0, 0, 0, 0.54);
    }

    .send-button {
      align-self: stretch;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 4.4rem;
      padding: 0 1rem;
      color: #000000;
      background: #ffffff;
      border: 0;
      border-left: 1px solid rgba(0, 0, 0, 0.22);
      font: 800 0.95rem/1 Arial, "Segoe UI", sans-serif;
      letter-spacing: 0;
      cursor: pointer;
      transition:
        opacity 180ms ease,
        transform 180ms ease,
        color var(--theme-duration) ease,
        background-color var(--theme-duration) ease,
        border-color var(--theme-duration) ease;
    }

    .send-button:hover {
      opacity: 0.82;
    }

    .send-button:active {
      transform: scale(0.96);
    }

    .send-button:disabled {
      cursor: default;
      opacity: 0.72;
    }

    .send-icon {
      width: 1.25rem;
      height: 1.25rem;
      stroke: currentColor;
      stroke-width: 2.15;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .upload-card {
      width: min(100%, 30rem);
      margin: 1.35rem auto 0;
      padding: 0.8rem 0.9rem 0.95rem;
      background: rgba(255, 255, 255, 0.44);
      border: 1px solid rgba(0, 0, 0, 0.22);
      border-radius: 0.85rem;
      direction: ltr;
      transition:
        opacity 560ms ease,
        transform 560ms cubic-bezier(0.22, 1, 0.36, 1),
        background-color var(--theme-duration) ease,
        border-color var(--theme-duration) ease;
    }

    :root[data-theme="dark"] .upload-card {
      background: rgba(255, 255, 255, 0.035);
      border-color: rgba(255, 255, 255, 0.28);
    }

    :root[data-theme="dark"] .link-row {
      background: #050505;
      border-color: #ffffff;
    }

    :root[data-theme="dark"] .link-input,
    :root[data-theme="dark"] .send-button {
      color: #ffffff;
      background: #050505;
    }

    :root[data-theme="dark"] .send-button {
      border-left-color: rgba(255, 255, 255, 0.32);
    }

    :root[data-theme="dark"] .link-input::placeholder {
      color: rgba(255, 255, 255, 0.62);
    }

    :root[data-theme="dark"] .under-square {
      background: #050505;
      border-color: #ffffff;
    }

    .upload-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      min-height: 1.5rem;
      margin-bottom: 0.55rem;
      color: var(--logo-color);
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0;
      transition: color var(--theme-duration) ease;
    }

    .upload-heading span {
      white-space: nowrap;
    }

    .logo-size-control {
      display: none;
      min-width: 5.2rem;
      flex: 1;
      accent-color: #2563eb;
    }

    .link-box.has-logo .logo-size-control {
      display: block;
    }

    .upload-delete {
      display: none;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      padding: 0;
      color: #ffffff;
      background: rgba(220, 38, 38, 0.72);
      border: 0;
      border-radius: 0.55rem;
      cursor: pointer;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .upload-delete:hover {
      opacity: 0.86;
      transform: translateY(-1px);
    }

    .link-box.has-logo .upload-delete {
      display: inline-flex;
    }

    .upload-dropzone {
      position: relative;
      display: grid;
      width: 100%;
      min-height: 7.1rem;
      place-items: center;
      overflow: hidden;
      padding: 0;
      color: #151515;
      background: rgba(255, 255, 255, 0.5);
      border: 1.5px dashed rgba(0, 0, 0, 0.42);
      border-radius: 0.68rem;
      font: inherit;
      cursor: pointer;
      appearance: none;
      transition:
        color var(--theme-duration) ease,
        border-color var(--theme-duration) ease,
        background-color var(--theme-duration) ease,
        transform 220ms ease;
    }

    :root[data-theme="dark"] .upload-dropzone {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .upload-card.is-dragging .upload-dropzone,
    .upload-dropzone:hover {
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(37, 99, 235, 0.76);
      transform: translateY(-1px);
    }

    :root[data-theme="dark"] .upload-card.is-dragging .upload-dropzone,
    :root[data-theme="dark"] .upload-dropzone:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .upload-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.55rem;
      text-align: center;
    }

    .upload-icon,
    .drop-file-icon {
      width: 2.2rem;
      height: 2.2rem;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .upload-title {
      font-size: 0.86rem;
      font-weight: 800;
    }

    .drop-copy {
      color: rgba(150, 150, 150, 0.72);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .upload-card.is-dragging .drop-copy {
      animation: drop-copy-pop 520ms cubic-bezier(0.18, 1.35, 0.32, 1) both;
    }

    .upload-preview {
      display: none;
      width: 4.7rem;
      height: 4.7rem;
      object-fit: contain;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.18);
      border-radius: 0.72rem;
      box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.12);
    }

    .link-box.has-logo .upload-empty {
      display: none;
    }

    .link-box.has-logo .upload-preview {
      display: block;
      animation: upload-preview-in 360ms cubic-bezier(0.18, 1.35, 0.32, 1) both;
    }

    .upload-input {
      display: none;
    }

    .under-square {
      position: relative;
      display: grid;
      width: 100%;
      aspect-ratio: 1;
      place-items: center;
      background: #ffffff;
      border: 1.5px solid #000000;
      border-radius: 0.85rem;
      overflow: hidden;
      transition:
        background-color var(--theme-duration) ease,
        border-color var(--theme-duration) ease;
    }

    .qr-area {
      width: min(100%, 30rem);
      margin: 2.35rem auto 0;
      transition:
        opacity 560ms ease,
        transform 560ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .link-box.is-ai-mode .link-label,
    .link-box.is-ai-mode .link-row {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-5.4rem) scale(0.96);
    }

    .link-box.is-ai-mode .upload-card {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
    }

    .link-box.is-ai-mode .qr-area {
      opacity: 0;
      pointer-events: none;
      transform: translateY(5.4rem) scale(0.96);
    }

    .ai-upload-card {
      position: fixed;
      left: 50%;
      bottom: clamp(5.45rem, 11vh, 7.2rem);
      z-index: 44;
      width: min(calc(100vw - 2rem), 42rem);
      margin: 0;
      padding: 0.58rem 0.92rem 0.64rem;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 5.5rem) scale(0.96);
      transition:
        opacity 520ms ease,
        transform 620ms cubic-bezier(0.18, 1.18, 0.32, 1),
        background-color var(--theme-duration) ease,
        border-color var(--theme-duration) ease;
    }

    body.is-ai-chat-visible .ai-upload-card {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0) scale(1);
    }

    .ai-upload-card.has-logo .upload-delete {
      display: inline-flex;
    }

    .ai-upload-card.has-logo .upload-empty {
      display: none;
    }

    .ai-upload-card.has-logo .upload-preview {
      display: block;
      width: 3.25rem;
      height: 3.25rem;
      animation: upload-preview-in 360ms cubic-bezier(0.18, 1.35, 0.32, 1) both;
    }

    .ai-upload-warning {
      position: absolute;
      left: 50%;
      top: -2.9rem;
      z-index: 2;
      min-width: min(100%, 18rem);
      padding: 0.58rem 1rem;
      color: rgba(225, 225, 225, 0.86);
      background: rgba(220, 38, 38, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 0.72rem;
      font-size: 0.86rem;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 0.5rem) scale(0.96);
      transition:
        opacity 260ms ease,
        transform 320ms cubic-bezier(0.18, 1.18, 0.32, 1);
    }

    .ai-upload-warning.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .ai-upload-card .upload-dropzone {
      min-height: 4.1rem;
    }

    .ai-history-toolbar {
      position: fixed;
      top: clamp(5.35rem, 10vh, 6.7rem);
      left: 0.85rem;
      z-index: 48;
      display: grid;
      gap: 0.55rem;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-0.55rem);
      transition:
        opacity 260ms ease,
        left 360ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 360ms cubic-bezier(0.22, 1, 0.36, 1);
      direction: ltr;
    }

    body.is-ai-chat-visible.is-signed-in .ai-history-toolbar {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    body.is-ai-history-open .ai-history-toolbar {
      left: min(18.2rem, calc(78vw + 0.85rem));
    }

    .ai-history-icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.52rem;
      width: 2.28rem;
      min-height: 2.28rem;
      padding: 0;
      color: #050505;
      background: rgba(255, 255, 255, 0.96);
      border: 1.4px solid rgba(5, 5, 5, 0.88);
      border-radius: 0.55rem;
      box-shadow: 0 0.7rem 1.8rem rgba(0, 0, 0, 0.16);
      cursor: pointer;
      overflow: hidden;
      white-space: nowrap;

      top: -0.46rem;
      right: -0.46rem;

      left: -0.46rem;

    function loadAuthConfig() {
      if (!authConfigPromise) {
        authConfigPromise = fetch("/auth-config")
          .then((response) => response.json())
          .then((config) => {

    function waitForGoogleApi() {
      if (window.google?.accounts?.oauth2) {
        return Promise.resolve(true);
      }

      return new Promise((resolve) => {
        let attempts = 0;
        const timer = setInterval(() => {
          attempts += 1;

          if (window.google?.accounts?.oauth2) {
            clearInterval(timer);
            resolve(true);
            return;
          }

          if (attempts >= 30) {
            clearInterval(timer);
            resolve(false);
          }
        }, 100);
      });
    }

    async function setupGoogleAuth() {
      if (googleTokenClient) {
        return googleTokenClient;
      }

      if (googleAuthSetupPromise) {
        return googleAuthSetupPromise;
      }

      googleAuthSetupPromise = (async () => {
        const config = await loadAuthConfig();
        const googleClientId = config.googleClientId || "";

        if (!googleClientId) {
          throw new Error("Google Client ID is missing in .env.");
        }

        const isGoogleReady = await waitForGoogleApi();

        if (!isGoogleReady) {
          throw new Error("Google sign in could not load. Please refresh and try again.");
        }

        googleTokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: googleClientId,
          scope: "openid email profile",
          callback: handleGoogleTokenResponse,
          error_callback: () => {
            setAuthMessage("Google sign in was cancelled.", "error");
            setGoogleLoading(false);
          },
        });

        return googleTokenClient;
      })().finally(() => {
        googleAuthSetupPromise = null;
      });

      return googleAuthSetupPromise;
    }

    async function loadRecaptchaScript() {
      await loadAuthConfig();

      if (!recaptchaSiteKey) {
        return false;
      }

      if (window.grecaptcha?.render) {
        return true;
      }

      if (!recaptchaScriptPromise) {
        recaptchaScriptPromise = new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://www.google.com/recaptcha/api.js?render=explicit";
          script.async = true;
          script.defer = true;
          script.onload = () => resolve(true);
          script.onerror = () => reject(new Error("Could not load CAPTCHA."));
          document.head.append(script);
        });
      }

      await recaptchaScriptPromise;
      return Boolean(window.grecaptcha?.render);
    }

    async function renderSignupRecaptcha() {
      const isReady = await loadRecaptchaScript();

      if (authMode !== "signup" || authCodeStep || recaptchaWidgetId !== null) {
        return;
      }

      if (!isReady || !window.grecaptcha?.render) {
        if (!recaptchaRenderTimer && recaptchaSiteKey) {
          recaptchaRenderTimer = setTimeout(() => {
            recaptchaRenderTimer = null;
            renderSignupRecaptcha();
          }, 220);
        }
        return;
      }

      recaptchaWidgetId = window.grecaptcha.render(signupRecaptcha, {
        sitekey: recaptchaSiteKey,
        theme: getTheme() === "dark" ? "dark" : "light",
      });
      recaptchaWrap.setAttribute("aria-hidden", "false");
    }

    function resetSignupRecaptcha() {
      if (recaptchaWidgetId !== null && window.grecaptcha?.reset) {
        window.grecaptcha.reset(recaptchaWidgetId);
      }
    }

    async function getSignupRecaptchaToken() {
      await renderSignupRecaptcha();

      if (!recaptchaSiteKey) {
        return "";
      }

      if (recaptchaWidgetId === null || !window.grecaptcha?.getResponse) {
        return "";
      }

      return window.grecaptcha.getResponse(recaptchaWidgetId);
    }

    async function handleGoogleTokenResponse(response) {
      if (!response?.access_token) {
        setAuthMessage("Google sign in was cancelled.", "error");
        setGoogleLoading(false);
        return;
      }

      try {
        setAuthLoading(true);
        const payload = await postJson("/google-sign-in", {
          accessToken: response.access_token,
          requestUri: window.location.origin,
        });

        setAuthUser({
          uid: payload.uid,
          email: payload.email,
          idToken: payload.idToken || "",
          name: payload.displayName || "",
          provider: "google",
          createdAt: payload.createdAt || "",
          birthday: payload.birthday || "",
          password: "",
        });
        setAuthMessage(payload.message || "Signed in with Google successfully.");
        await delay(550);
        const shouldContinueAi = pendingAiSubmitAfterAuth;
        if (shouldContinueAi) {
          pendingAiSubmitAfterAuth = false;
          pendingAiGuestSubmit = false;
          localStorage.setItem("qrAiGuestPromptSeen", "true");
        }
        closeAuthModal();
        if (shouldContinueAi) {
          await generateAiTemplate({ skipGuestGate: true });
          return;
        }
        if (isAccountPage || localStorage.getItem(pageStorageKey) === "account") {
          openAccountPage({ section: "info" });
        }
      } catch (error) {
        setAuthMessage(error.message || "Could not sign in with Google.", "error");
      } finally {
        setAuthLoading(false);
        setGoogleLoading(false);
      }
    }

    function setAuthMode(mode, { codeStep = false, message = "", messageType = "success", clearCode = true } = {}) {
      const isSignup = mode === "signup";
      const isReset = mode === "reset";

      authMode = mode;
      authCodeStep = codeStep;

        const isActive = isSignup ? tab.dataset.authTab === "signup" : tab.dataset.authTab === "signin";

      authForm.classList.toggle("is-signup", isSignup);
      authForm.classList.toggle("is-reset", isReset);
      authForm.classList.toggle("is-code-step", codeStep);

      authEmail.disabled = codeStep;
      authDay.disabled = !isSignup || codeStep;
      authDay.required = isSignup && !codeStep;
      authMonth.disabled = !isSignup || codeStep;
      authMonth.required = isSignup && !codeStep;
      authYear.disabled = !isSignup || codeStep;
      authYear.required = isSignup && !codeStep;
      authTerms.disabled = !isSignup || codeStep;
      authTerms.required = isSignup && !codeStep;
      authCodeFields.setAttribute("aria-hidden", codeStep ? "false" : "true");
      recaptchaWrap.setAttribute("aria-hidden", isSignup && !codeStep ? "false" : "true");
      setOtpEnabled(codeStep);
      authPassword.disabled = (isReset && !codeStep) || (isSignup && codeStep);
      authPassword.required = mode === "signin" || (isSignup && !codeStep) || (isReset && codeStep);
      authPassword.placeholder = isReset ? t("newPassword") : t("password");
      authPassword.autocomplete = isSignup || isReset ? "new-password" : "current-password";

      if (clearCode) {
        clearOtpInputs();
      }

      const buttonLabel = codeStep
        ? isReset ? t("resetPassword") : t("verifyCode")
        : isReset ? t("sendResetCode") : isSignup ? t("createAccount") : t("signIn");

      authSubmitButton.dataset.label = buttonLabel;
      authSubmitButton.textContent = buttonLabel;
      authSwitchText.textContent = isSignup
        ? t("haveAccountSignin")
        : isReset
          ? t("backToSignIn")
          : t("noAccountSignup");
      setAuthMessage(message, messageType);

      if (isSignup && !codeStep) {
        requestAnimationFrame(() => renderSignupRecaptcha());
      } else {
        resetSignupRecaptcha();
      }
    }

    function normalizeWheelValue(input, fallback = Number(input.dataset.min)) {
      const min = Number(input.dataset.min);
      const max = Number(input.dataset.max);
      const pad = Number(input.dataset.pad || 0);
      const rawNumber = Number.parseInt(input.value.replace(/\D/g, ""), 10);
      const value = Number.isNaN(rawNumber) ? fallback : rawNumber;
      const clamped = clamp(value, min, max);

      input.value = String(clamped).padStart(pad, "0");
      return clamped;
    }

    function shiftWheelValue(input, step) {
      const min = Number(input.dataset.min);
      const max = Number(input.dataset.max);
      const current = normalizeWheelValue(input, min);
      const next = current + step;
      const wrapped = next > max ? min : next < min ? max : next;
      const pad = Number(input.dataset.pad || 0);

      input.value = String(wrapped).padStart(pad, "0");
    }

    function getAuthBirthday() {
      if (!authDay.value || !authMonth.value || !authYear.value) {
        return "";
      }

      const day = normalizeWheelValue(authDay);
      const year = normalizeWheelValue(authYear);
      return `${year}-${authMonth.value}-${String(day).padStart(2, "0")}`;
    }

    function getAuthDisplayName(email) {
      return email.split("@")[0].replace(/[._-]+/g, " ").replace(/\b\w/g, (letter) => letter.toUpperCase()) || "Customer";
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(body),
      });
      const payload = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(payload.error || "Request failed.");
      }

      return payload;
    }

    async function handleAuthSubmit() {
      if (authBusy) {
        return;
      }

      if (!authForm.reportValidity()) {
        return;
      }

      const email = authEmail.value.trim().toLowerCase();
      const password = authPassword.value;
      const code = getOtpCode();

      setAuthLoading(true);
      setAuthMessage("");

      try {
        if (authMode === "signin") {
          const payload = await postJson("/sign-in", { email, password });
          setAuthUser({
            uid: payload.uid,
            email: payload.email,
            idToken: payload.idToken || "",
            provider: payload.provider || "password",
            createdAt: payload.createdAt || "",
            birthday: payload.birthday || "",
            password,
          });
          setAuthMessage(payload.message || "Signed in successfully.");
          await delay(550);
          const shouldContinueAi = pendingAiSubmitAfterAuth;
          if (shouldContinueAi) {
            pendingAiSubmitAfterAuth = false;
            pendingAiGuestSubmit = false;
            localStorage.setItem("qrAiGuestPromptSeen", "true");
          }
          closeAuthModal();
          if (shouldContinueAi) {
            await generateAiTemplate({ skipGuestGate: true });
            return;
          }
          if (isAccountPage || localStorage.getItem(pageStorageKey) === "account") {
            openAccountPage({ section: "info" });
          }
          return;
        }

        if (authMode === "signup" && !authCodeStep) {
          if (!authTerms.checked) {
            throw new Error("Please agree to the Terms and Conditions.");
          }

          const recaptchaToken = await getSignupRecaptchaToken();

          if (recaptchaSiteKey && !recaptchaToken) {
            throw new Error("Please complete the CAPTCHA.");
          }

          const payload = await postJson("/send-code", {
            email,
            password,
            birthday: getAuthBirthday(),
            name: getAuthDisplayName(email),
            recaptchaToken,
          });
          setAuthMode("signup", {
            codeStep: true,
            message: payload.message || "Verification code sent.",
          });
          focusFirstOtpInput();
          return;
        }

        if (authMode === "signup") {
          if (!/^[0-9]{6}$/.test(code)) {
            focusFirstOtpInput();
            throw new Error("Please enter a valid 6-digit code.");
          }

          const payload = await postJson("/verify-code", { email, code });
          setAuthMode("signin", {
            message: payload.message || "Account created. Sign in now.",
          });
          authPassword.value = "";
          authEmail.disabled = false;
          authEmail.focus();
          return;
        }

        if (authMode === "reset" && !authCodeStep) {
          const payload = await postJson("/send-reset-code", { email });
          setAuthMode("reset", {
            codeStep: true,
            message: payload.message || "Password reset code sent.",
          });
          authPassword.value = "";
          focusFirstOtpInput();
          return;
        }

        if (authMode === "reset") {
          if (!/^[0-9]{6}$/.test(code)) {
            focusFirstOtpInput();
            throw new Error("Please enter a valid 6-digit code.");
          }

          const payload = await postJson("/reset-password", {
            email,
            code,
            newPassword: password,
          });
          setAuthMode("signin", {
            message: payload.message || "Password reset successfully. You can sign in now.",
          });
          const currentUser = getAuthUser();
          if (currentUser?.email === email) {
            setAuthUser({ ...currentUser, password });
          }
          authPassword.value = "";
          authEmail.disabled = false;
        }
      } catch (error) {
        setAuthMessage(error.message || "Something went wrong.", "error");
        if (authMode === "signup" && !authCodeStep) {
          resetSignupRecaptcha();
        }
      } finally {
        setAuthLoading(false);
      }
    }

    function normalizeLink(value) {
      const trimmed = value.trim();

      if (!trimmed) {
        return "";

      return /^[a-z][a-z0-9+.-]*:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;

    function getLogoBox(aspect, size = uploadedLogoSize) {
      const maxSide = size;

      if (aspect >= 1) {
        return {
          width: maxSide,
          height: maxSide / aspect,
        };
      }

      return {
        width: maxSide * aspect,
        height: maxSide,
      };
    }

    function clampCropRect() {
      const minSize = 0.08;

      cropRect.width = clamp(cropRect.width, minSize, 1);
      cropRect.height = clamp(cropRect.height, minSize, 1);
      cropRect.x = clamp(cropRect.x, 0, 1 - cropRect.width);
      cropRect.y = clamp(cropRect.y, 0, 1 - cropRect.height);
    }

    function renderCrop() {
      if (!modalImage.naturalWidth) {
        return;
      }

      const stage = modalPreview.getBoundingClientRect();
      const imageAspect = modalImage.naturalWidth / modalImage.naturalHeight;
      const stageAspect = stage.width / stage.height;
      let width = stage.width;
      let height = stage.height;

      if (imageAspect > stageAspect) {
        height = width / imageAspect;
      } else {
        width = height * imageAspect;
      }

      cropLayout = {
        x: (stage.width - width) / 2,
        y: (stage.height - height) / 2,
        width,
        height,
      };

      modalImage.style.left = `${cropLayout.x}px`;
      modalImage.style.top = `${cropLayout.y}px`;
      modalImage.style.width = `${cropLayout.width}px`;
      modalImage.style.height = `${cropLayout.height}px`;

      clampCropRect();
      cropBox.style.left = `${cropLayout.x + cropRect.x * cropLayout.width}px`;
      cropBox.style.top = `${cropLayout.y + cropRect.y * cropLayout.height}px`;
      cropBox.style.width = `${cropRect.width * cropLayout.width}px`;
      cropBox.style.height = `${cropRect.height * cropLayout.height}px`;
    }

    function createCroppedLogoDataUrl() {
      clampCropRect();
      const imageWidth = modalImage.naturalWidth;
      const imageHeight = modalImage.naturalHeight;
      const sourceX = cropRect.x * imageWidth;
      const sourceY = cropRect.y * imageHeight;
      const sourceWidth = cropRect.width * imageWidth;
      const sourceHeight = cropRect.height * imageHeight;
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      const maxOutput = 640;
      const scale = Math.min(1, maxOutput / Math.max(sourceWidth, sourceHeight));

      canvas.width = Math.max(1, Math.round(sourceWidth * scale));
      canvas.height = Math.max(1, Math.round(sourceHeight * scale));
      context.drawImage(modalImage, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, canvas.width, canvas.height);

      return {
        dataUrl: canvas.toDataURL("image/png"),
        aspect: sourceWidth / sourceHeight,
      };
    }

    function loadImage(source) {
      return new Promise((resolve, reject) => {
        const image = new Image();

        image.onload = () => resolve(image);

        image.src = source;
      });

    function drawImageCover(context, image, x, y, width, height) {
      const imageWidth = image.naturalWidth || image.width;
      const imageHeight = image.naturalHeight || image.height;
      const scale = Math.max(width / imageWidth, height / imageHeight);
      const sourceWidth = width / scale;
      const sourceHeight = height / scale;
      const sourceX = (imageWidth - sourceWidth) / 2;
      const sourceY = (imageHeight - sourceHeight) / 2;

      context.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, x, y, width, height);
    }

    function roundedRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
    }

    async function createQrPngBlob(url) {
      const response = await fetch(url, { mode: "cors" });

      if (!response.ok) {
        throw new Error("Could not fetch QR code");
      }

      const qrBlob = await response.blob();
      const activeLogo = getActiveLogo();

      if (!activeLogo.dataUrl) {
        return qrBlob.type === "image/png" ? qrBlob : new Blob([qrBlob], { type: "image/png" });
      }

      const qrObjectUrl = URL.createObjectURL(qrBlob);
      const qrBitmap = await loadImage(qrObjectUrl);
      const logoBitmap = await loadImage(activeLogo.dataUrl);
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      const size = 900;

      canvas.width = size;
      canvas.height = size;
      context.drawImage(qrBitmap, 0, 0, size, size);

      const logoBox = getLogoBox(activeLogo.aspect);
      const logoWidth = Math.round(size * logoBox.width);
      const logoHeight = Math.round(size * logoBox.height);
      const padding = Math.max(10, Math.round(Math.min(logoWidth, logoHeight) * 0.12));
      const logoX = Math.round((size - logoWidth) / 2);
      const logoY = Math.round((size - logoHeight) / 2);

      context.fillStyle = "#ffffff";
      roundedRect(context, logoX, logoY, logoWidth, logoHeight, Math.round(Math.min(logoWidth, logoHeight) * 0.16));
      context.fill();
      context.save();
      roundedRect(
        context,
        logoX + padding,
        logoY + padding,
        logoWidth - padding * 2,
        logoHeight - padding * 2,
        Math.round(Math.min(logoWidth, logoHeight) * 0.1)
      );
      context.clip();
      drawImageCover(
        context,
        logoBitmap,
        logoX + padding,
        logoY + padding,
        logoWidth - padding * 2,
        logoHeight - padding * 2
      );
      context.restore();
      URL.revokeObjectURL(qrObjectUrl);

      return new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
    }

    async function downloadPng(url) {
      try {
        const blob = await createQrPngBlob(url);
        const objectUrl = URL.createObjectURL(blob);
        const downloadLink = document.createElement("a");

        downloadLink.href = objectUrl;
        downloadLink.download = "qr-code.png";
        document.body.append(downloadLink);
        downloadLink.click();
        downloadLink.remove();
        setTimeout(() => URL.revokeObjectURL(objectUrl), 500);
      } catch (error) {
        const fallbackLink = document.createElement("a");

        fallbackLink.href = url;
        fallbackLink.download = "qr-code.png";
        fallbackLink.target = "_blank";
        fallbackLink.rel = "noopener";
        fallbackLink.click();
      }
    }

      const user = getAuthUser();

      if (!user?.idToken) {

      };

    async function refreshAiAuthTokenIfPossible() {
      const user = getAuthUser();

      if (!user || user.idToken || !user.email || !user.password || user.provider === "google") {
        return false;
      }

      try {
        const payload = await postJson("/sign-in", {
          email: user.email,
          password: user.password,
        });
        setAuthUser({
          ...user,
          uid: payload.uid || user.uid,
          email: payload.email || user.email,
          idToken: payload.idToken || "",
          provider: payload.provider || user.provider || "password",
          createdAt: payload.createdAt || user.createdAt || "",
          birthday: payload.birthday || user.birthday || "",
        });
        return Boolean(payload.idToken);
      } catch (error) {
        console.warn("Could not refresh auth token for AI history.", error);
        return false;
      }
    }

    async function aiHistoryRequest(url, options = {}) {
      let headers = getAiAuthHeaders();

      if (!headers) {
        await refreshAiAuthTokenIfPossible();
        headers = getAiAuthHeaders();
      }

      if (!headers) {
        throw new Error("Sign in is required.");
      }

      const response = await fetch(url, {
        ...options,
        headers: {
          ...headers,
          ...(options.headers || {}),
        },
      });
      const payload = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(payload.error || "Chat history request failed.");
      }

      return payload;
    }

    function getAiChatTitle(prompt) {
      return String(prompt || "").trim().split(/\s+/).filter(Boolean).slice(0, 7).join(" ") || t("newChat");

    function getAiHistoryStorageKey() {
      const user = getAuthUser();
      const owner = user?.uid || user?.email || "guest";
      return `qrAiHistory:${owner}`;

    function readLocalAiHistory() {
      try {
        const chats = JSON.parse(localStorage.getItem(getAiHistoryStorageKey()) || "[]");
        return Array.isArray(chats) ? chats : [];
      } catch (error) {
        return [];
      }
    }

    function writeLocalAiHistory(chats) {
      localStorage.setItem(getAiHistoryStorageKey(), JSON.stringify(chats.slice(0, 60)));
    }

    function getLocalAiChat(chatId) {
      return readLocalAiHistory().find((chat) => chat.id === chatId) || null;

    function setAiChatsFromLocal() {
      aiChats = readLocalAiHistory()
        .map((chat) => ({
          id: chat.id,
          title: chat.title || t("newChat"),
          createdAt: chat.createdAt || "",
          updatedAt: chat.updatedAt || chat.createdAt || "",
        }))
        .sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
      renderAiHistoryList();
    }

    function saveLocalAiHistoryMessage(prompt, image) {
      const now = new Date().toISOString();
      const chats = readLocalAiHistory();
      let chat = activeAiChatId ? chats.find((item) => item.id === activeAiChatId) : null;

      if (!chat) {
        chat = {
          id: activeAiChatId || `local-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          title: getAiChatTitle(prompt),
          createdAt: now,
          updatedAt: now,
          messages: [],
        };
        activeAiChatId = chat.id;
        chats.unshift(chat);
      }

      chat.messages = Array.isArray(chat.messages) ? chat.messages : [];
      chat.messages.push({
        id: `msg-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        prompt,
        image,
        createdAt: now,
      });
      chat.updatedAt = now;

      chats.sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
      writeLocalAiHistory(chats);
      setAiChatsFromLocal();
      return chat;
    }

    function replaceLocalChatId(oldId, cloudChat) {
      if (!oldId || !cloudChat?.id || oldId === cloudChat.id) {
        return;
      }

      const chats = readLocalAiHistory();
      const chat = chats.find((item) => item.id === oldId);

      if (!chat) {
        return;
      }

      chat.id = cloudChat.id;
      chat.title = cloudChat.title || chat.title;
      chat.createdAt = cloudChat.createdAt || chat.createdAt;
      chat.updatedAt = cloudChat.updatedAt || chat.updatedAt;
      activeAiChatId = cloudChat.id;
      writeLocalAiHistory(chats);
      setAiChatsFromLocal();
    }

    function removeLocalAiChat(chatId) {
      const chats = readLocalAiHistory().filter((chat) => chat.id !== chatId);
      writeLocalAiHistory(chats);
      setAiChatsFromLocal();
    }

    async function prepareAiHistoryImage(dataUrl) {
      if (!dataUrl || dataUrl.length < 850000) {
        return dataUrl;
      }

      try {
        const image = await loadImage(dataUrl);
        const width = image.naturalWidth || image.width || 1024;
        const height = image.naturalHeight || image.height || 1024;
        const scale = Math.min(768 / width, 768 / height, 1);
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/webp", 0.9);
      } catch (error) {
        return dataUrl;
      }
    }

    function getRelativeTime(value) {
      const date = value ? new Date(value) : null;

      if (!date || Number.isNaN(date.getTime())) {
        return "";
      }

      const diff = Date.now() - date.getTime();
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;
      const week = 7 * day;

      if (diff < hour) return `${Math.max(1, Math.round(diff / minute))}m`;
      if (diff < day) return `${Math.round(diff / hour)}h`;
      if (diff < week) return `${Math.round(diff / day)}d`;
      return `${Math.round(diff / week)}w`;
    }

    function renderAiHistoryList() {
      aiHistoryList.innerHTML = "";
      aiHistoryEmpty.hidden = aiChats.length > 0;

      aiChats.forEach((chat) => {
        const entry = document.createElement("div");
        const title = document.createElement("span");
        const meta = document.createElement("span");
        const deleteButton = document.createElement("button");

        entry.className = `ai-history-entry ${chat.id === activeAiChatId ? "is-active" : ""}`;
        entry.setAttribute("role", "button");
        entry.tabIndex = 0;
        title.className = "ai-history-title";
        title.textContent = chat.title || t("newChat");
        meta.className = "ai-history-time";
        meta.textContent = getRelativeTime(chat.updatedAt);
        deleteButton.className = "ai-history-delete";
        deleteButton.type = "button";
        deleteButton.setAttribute("aria-label", t("deleteChat"));
        deleteButton.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="m19 6-1 14H6L5 6" />
            <path d="M10 11v5" />
            <path d="M14 11v5" />
          </svg>
        `;
        deleteButton.addEventListener("click", async (event) => {
          event.stopPropagation();
          await deleteAiChat(chat.id);
        });
        entry.addEventListener("click", () => loadAiChat(chat.id));
        entry.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            loadAiChat(chat.id);
          }
        });
        entry.append(title, meta, deleteButton);
        aiHistoryList.append(entry);
      });
    }

    async function loadAiHistory({ force = false } = {}) {
      const user = getAuthUser();

      if (!isSignedIn() || !user?.uid) {
        aiChats = [];
        activeAiChatId = "";
        aiHistoryLoadedForUid = "";
        renderAiHistoryList();
        setAiHistoryOpen(false);
        return;
      }

      setAiChatsFromLocal();

      if (!force && aiHistoryLoadedForUid === user.uid) {
        renderAiHistoryList();
        return;
      }

      try {
        const payload = await aiHistoryRequest("/ai-chats");
        const cloudChats = payload.chats || [];
        const localChats = readLocalAiHistory();
        const merged = [
          ...cloudChats.map((chat) => ({
            ...chat,
            messages: localChats.find((item) => item.id === chat.id)?.messages || [],
          })),
          ...localChats.filter((chat) => !cloudChats.some((item) => item.id === chat.id)),
        ].sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

        writeLocalAiHistory(merged);
        setAiChatsFromLocal();
        aiHistoryLoadedForUid = user.uid;
      } catch (error) {
        console.warn(error);
      }
    }

    async function loadAiChat(chatId) {
      if (!chatId || isAiGenerating) {
        return;
      }

      const localChat = getLocalAiChat(chatId);

      if (localChat) {
        activeAiChatId = localChat.id;
        aiResultPanel.innerHTML = "";
        (localChat.messages || []).forEach((message) => {
          aiResultPanel.append(createAiResultItem("ready", message.image, { prompt: message.prompt }));
        });
        updateAiResultPanelState();
        renderAiHistoryList();
      }

      try {
        const payload = await aiHistoryRequest(`/ai-chats/${encodeURIComponent(chatId)}`);
        const chat = payload.chat;

        if (!chat) {
          return;
        }

        activeAiChatId = chat.id;
        aiResultPanel.innerHTML = "";
        (chat.messages || []).forEach((message) => {
          aiResultPanel.append(createAiResultItem("ready", message.image, { prompt: message.prompt }));
        });
        const localChats = readLocalAiHistory();
        const existing = localChats.find((item) => item.id === chat.id);

        if (existing) {
          existing.title = chat.title || existing.title;
          existing.createdAt = chat.createdAt || existing.createdAt;
          existing.updatedAt = chat.updatedAt || existing.updatedAt;
          existing.messages = chat.messages || existing.messages || [];
          writeLocalAiHistory(localChats);
        }

        updateAiResultPanelState();
        setAiChatsFromLocal();
      } catch (error) {
        console.warn(error);
      }
    }

    async function saveAiHistoryMessage(prompt, image) {
      if (!isSignedIn()) {
        return;
      }

      try {
        const historyImage = await prepareAiHistoryImage(image);
        const previousChatId = activeAiChatId;
        const localChat = saveLocalAiHistoryMessage(prompt, historyImage);

        if (!previousChatId || String(previousChatId).startsWith("local-")) {
          const payload = await aiHistoryRequest("/ai-chats", {
            method: "POST",
            body: JSON.stringify({
              title: getAiChatTitle(prompt),
              prompt,
              image: historyImage,
            }),
          });
          const chat = payload.chat;
          replaceLocalChatId(localChat.id, chat);
          return;
        }

        const payload = await aiHistoryRequest(`/ai-chats/${encodeURIComponent(activeAiChatId)}/messages`, {
          method: "POST",
          body: JSON.stringify({ prompt, image: historyImage }),
        });
        const updatedAt = payload.message?.createdAt || new Date().toISOString();
        const localChats = readLocalAiHistory();
        const chat = localChats.find((item) => item.id === activeAiChatId);

        if (chat) {
          chat.updatedAt = updatedAt;
          writeLocalAiHistory(localChats);
          setAiChatsFromLocal();
        }
      } catch (error) {
        console.warn(t("chatHistoryUnavailable"), error);
      }
    }

    async function deleteAiChat(chatId) {
      if (!chatId) {
        return;
      }

      removeLocalAiChat(chatId);

      if (activeAiChatId === chatId) {
        activeAiChatId = "";
        aiResultPanel.innerHTML = "";
        updateAiResultPanelState();
      }

      try {
        await aiHistoryRequest(`/ai-chats/${encodeURIComponent(chatId)}`, {
          method: "DELETE",
        });
      } catch (error) {
        console.warn(error);
      }
    }

    function startNewAiChat() {
      activeAiChatId = "";
      aiResultPanel.innerHTML = "";
      updateAiResultPanelState();
      setAiChatsFromLocal();
      aiChatInput.focus();
    }

    function shouldShowGuestAiAuthPrompt() {
      return !isSignedIn() && localStorage.getItem("qrAiGuestPromptSeen") !== "true";
    }

    async function generateAiTemplate({ skipGuestGate = false } = {}) {
      const description = aiChatInput.value.trim();
      const qrImage = aiUploadedLogoDataUrl;

      if (!qrImage) {
        showAiUploadWarning();
        return;
      }

      if (!description) {
        aiChatInput.focus();
        return;
      }

      if (isAiGenerating) {
        return;
      }

      if (!skipGuestGate && shouldShowGuestAiAuthPrompt()) {
        pendingAiGuestSubmit = true;
        pendingAiSubmitAfterAuth = true;
        openAuthModal({
          allowGuest: true,
          notice: t("historySignInNotice"),
        });
        return;
      }

      clearAiDraft();
      setAiGenerating(true);
      const resultItem = appendAiLoadingItem(description);

      try {
        const response = await fetch("/generate-ai", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            qrImage,
            description,
          }),
        });

        const contentType = response.headers.get("content-type") || "";
        const payload = contentType.includes("application/json")
          ? await response.json()
          : { error: await response.text() };

        if (!response.ok || !payload.image) {
          throw new Error(payload.error || t("couldNotGenerate"));
        }

        if (!isAiMode) {
          resultItem.remove();
          updateAiResultPanelState();
          return;
        }

        replaceAiResultItem(resultItem, "ready", payload.image, { prompt: description });
        await saveAiHistoryMessage(description, payload.image);
        aiChatInput.blur();
      } catch (error) {
        if (isAiMode) {
          replaceAiResultItem(resultItem, "error", error.message || t("couldNotGenerate"));
        } else {
          resultItem.remove();
          updateAiResultPanelState();
        }
      } finally {
        setAiGenerating(false);
      }
    }

    async function enterAiMode() {
      if (isAiMode || isAiAnimating || isQrBusy) {
        return;
      }

      if (isAccountPage) {
        closeAccountPage();
      }

      isAiAnimating = true;
      aiLogoButton.disabled = true;

      if (currentQrUrl && linkForm.classList.contains("is-qr-ready")) {
        await playClearQrAnimation({ focusAfter: false });
      }

      requestAnimationFrame(() => setAiModeActive(true));

      await delay(280);
      setAiChatVisible(true);
      await delay(360);
      aiLogoButton.disabled = false;
      isAiAnimating = false;
    }

    async function exitAiMode() {
      if (!isAiMode || isAiAnimating) {
        return;
      }

      isAiAnimating = true;
      aiLogoButton.disabled = true;
      setAiChatVisible(false);

      await delay(280);
      setAiModeActive(false);
      await delay(360);
      aiLogoButton.disabled = false;
      isAiAnimating = false;
      linkInput.focus();
    }

    function restoreSavedPage() {
      const savedPage = localStorage.getItem(pageStorageKey);

      if (savedPage === "account") {
        openAccountPage({ section: isSignedIn() ? "info" : "general", allowGuest: true });
        return;
      }

      if (savedPage !== "ai") {
        return;
      }

      setAiModeActive(true);
      setAiChatVisible(true, { focusInput: false });
    }

    populateBirthdayMonths();
    populateLanguages();
    renderTextBox(aboutTextBox, "About QMakerr", aboutParagraphs);
    renderTextBox(accountTermsBox, "Terms and Conditions", termsParagraphs);
    renderTextBox(termsPageContent, "Terms and Conditions", termsParagraphs);
    setAuthMode("signin");
    updateLoginButtonState();
    setButtonForTheme(getTheme());
    startLogoSpinLoop();
    restoreSavedPage();

    document.addEventListener("copy", (event) => event.preventDefault());
    document.addEventListener("cut", (event) => event.preventDefault());
    document.addEventListener("selectstart", (event) => event.preventDefault());

    logoLink.addEventListener("animationend", () => {
      logoLink.classList.remove("is-spinning");
    });

    logoLink.addEventListener("click", (event) => {
      if (!isAiMode) {
        return;
      }

      event.preventDefault();
      exitAiMode();
    });

    aiLogoButton.addEventListener("click", enterAiMode);

    settingsButton.addEventListener("click", () => {
      openAccountPage({ section: "general", allowGuest: true });
    });

    loginButton.addEventListener("click", () => {
      if (isSignedIn()) {
        openAccountPage();
        return;
      }

      openAuthModal();
    });

    authCloseButton.addEventListener("click", closeAuthModal);
    authGuestContinue.addEventListener("click", () => {
      if (pendingAiGuestSubmit) {
        pendingAiGuestSubmit = false;
        pendingAiSubmitAfterAuth = false;
        localStorage.setItem("qrAiGuestPromptSeen", "true");
        closeAuthModal();
        generateAiTemplate({ skipGuestGate: true });
        return;
      }

      closeAuthModal();
      openAccountPage({ section: "general", allowGuest: true });
    });

    confirmLogout.addEventListener("click", logoutUser);
    cancelLogout.addEventListener("click", closeLogoutModal);

    accountBack.addEventListener("click", closeAccountPage);
    accountSignOut.addEventListener("click", openLogoutModal);
    toggleAccountEmail.addEventListener("click", () => {
      accountEmailVisible = !accountEmailVisible;
      updateAccountDisplay();
    });
    toggleAccountPassword.addEventListener("click", () => {
      accountPasswordVisible = !accountPasswordVisible;
      updateAccountDisplay();
    });
    accountMenuButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAccountSection(button.dataset.accountSection);
      });
    });
    languageSelect.addEventListener("change", () => {
      applyLanguageChoice(languageSelect.value);
    });
    accountThemeToggle.addEventListener("click", () => {
      startThemeTransition(getTheme() === "dark" ? "light" : "dark");
    });
    signupTermsLink.addEventListener("click", openTermsPage);
    termsPageClose.addEventListener("click", closeTermsPage);

    authTabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        setAuthMode(tab.dataset.authTab);
      });
    });

    authSwitchText.addEventListener("click", () => {
      const nextMode = authMode === "signin" ? "signup" : "signin";
      setAuthMode(nextMode);
    });

    passwordToggle.addEventListener("click", togglePasswordVisibility);

    googleAuthButton.addEventListener("click", handleGoogleButtonClick);

    forgotPasswordButton.addEventListener("click", () => {
      setAuthMode("reset");
      authEmail.focus();
    });

    authCodeInputs.forEach((input, index) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 1);

        if (input.value && authCodeInputs[index + 1]) {
          authCodeInputs[index + 1].focus();
        }
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Backspace" && !input.value && authCodeInputs[index - 1]) {
          authCodeInputs[index - 1].focus();
        }
      });

      input.addEventListener("paste", (event) => {
        const pasted = event.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);

        if (!pasted) {
          return;
        }

        event.preventDefault();
        authCodeInputs.forEach((field, fieldIndex) => {
          field.value = pasted[fieldIndex] || "";
        });
        authCodeInputs[Math.min(pasted.length, authCodeInputs.length) - 1]?.focus();
      });
    });

    dateWheelInputs.forEach((input) => {
      let dragState = null;

      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, Number(input.maxLength));
      });

      input.addEventListener("blur", () => {
        if (input.value) {
          normalizeWheelValue(input);
        }
      });

      input.addEventListener("wheel", (event) => {
        event.preventDefault();
        shiftWheelValue(input, event.deltaY > 0 ? 1 : -1);
      }, { passive: false });

      input.addEventListener("pointerdown", (event) => {
        if (input.disabled) {
          return;
        }

        dragState = {
          startY: event.clientY,
          lastStep: 0,
          moved: false,
        };
        input.setPointerCapture(event.pointerId);
      });

      input.addEventListener("pointermove", (event) => {
        if (!dragState) {
          return;
        }

        const step = Math.trunc((dragState.startY - event.clientY) / 18);

        if (step === dragState.lastStep) {
          return;
        }

        event.preventDefault();
        dragState.moved = true;
        shiftWheelValue(input, step - dragState.lastStep);
        dragState.lastStep = step;
      });

      input.addEventListener("pointerup", () => {
        if (dragState?.moved) {
          normalizeWheelValue(input);
        }

        dragState = null;
      });

      input.addEventListener("pointercancel", () => {
        dragState = null;
      });
    });

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      await handleAuthSubmit();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && authModal.classList.contains("is-open")) {
        closeAuthModal();
      }

      if (event.key === "Escape" && logoutModal.classList.contains("is-open")) {
        closeLogoutModal();
      }

      if (event.key === "Escape" && termsPageModal.classList.contains("is-open")) {
        closeTermsPage();
      }
    });

    aiChatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      await generateAiTemplate();
    });

    aiHistoryToggle.addEventListener("click", () => {
      setAiHistoryOpen(!isAiHistoryOpen);
    });

    aiNewChatButton.addEventListener("click", startNewAiChat);

    themeToggle.addEventListener("click", () => {
      startThemeTransition(getTheme() === "dark" ? "light" : "dark");
    });

    uploadDropzone.addEventListener("click", () => {
      imageInput.click();
    });

    aiUploadDropzone.addEventListener("click", () => {
      aiImageInput.click();
    });

    imageInput.addEventListener("change", () => {
      handleImageFile(imageInput.files?.[0], "main");
      imageInput.value = "";
    });

    aiImageInput.addEventListener("change", () => {
      handleImageFile(aiImageInput.files?.[0], "ai");
      aiImageInput.value = "";
    });

    doneLogo.addEventListener("click", applyPendingLogo);

    logoSizeControl.addEventListener("input", () => {
      uploadedLogoSize = Number(logoSizeControl.value) / 100;
      updateLogoPreview();
    });

    cropBox.addEventListener("pointerdown", (event) => {
      if (!pendingLogoDataUrl) {
        return;
      }

      event.preventDefault();
      cropBox.setPointerCapture(event.pointerId);
      modalPreview.classList.add("is-cropping");
      cropDrag = {
        pointerId: event.pointerId,
        mode: event.target.dataset.handle ? "resize" : "move",
        handle: event.target.dataset.handle || "",
        startX: event.clientX,
        startY: event.clientY,
        rect: { ...cropRect },
      };
    });

    cropBox.addEventListener("pointermove", (event) => {
      if (!cropDrag || cropDrag.pointerId !== event.pointerId) {
        return;
      }

      const dx = (event.clientX - cropDrag.startX) / cropLayout.width;
      const dy = (event.clientY - cropDrag.startY) / cropLayout.height;
      const start = cropDrag.rect;
      const minSize = 0.08;

      if (cropDrag.mode === "move") {
        cropRect = {
          ...start,
          x: clamp(start.x + dx, 0, 1 - start.width),
          y: clamp(start.y + dy, 0, 1 - start.height),
        };
      } else {
        const right = start.x + start.width;
        const bottom = start.y + start.height;
        let x = start.x;
        let y = start.y;
        let width = start.width;
        let height = start.height;

        if (cropDrag.handle.includes("e")) {
          width = clamp(start.width + dx, minSize, 1 - start.x);
        }

        if (cropDrag.handle.includes("s")) {
          height = clamp(start.height + dy, minSize, 1 - start.y);
        }

        if (cropDrag.handle.includes("w")) {
          x = clamp(start.x + dx, 0, right - minSize);
          width = right - x;
        }

        if (cropDrag.handle.includes("n")) {
          y = clamp(start.y + dy, 0, bottom - minSize);
          height = bottom - y;
        }

        cropRect = { x, y, width, height };
      }

      renderCrop();
    });

    cropBox.addEventListener("pointerup", (event) => {
      if (cropDrag?.pointerId === event.pointerId) {
        cropDrag = null;
        modalPreview.classList.remove("is-cropping");
      }
    });

    cropBox.addEventListener("pointercancel", () => {
      cropDrag = null;
      modalPreview.classList.remove("is-cropping");
    });

    window.addEventListener("resize", renderCrop);

    removeLogo.addEventListener("click", (event) => {
      event.stopPropagation();
      clearUploadedLogo();
    });

    aiRemoveLogo.addEventListener("click", (event) => {
      event.stopPropagation();
      clearUploadedLogo("ai");
    });

    document.addEventListener("dragenter", (event) => {
      if (!hasImageFiles(event)) {
        return;
      }

      event.preventDefault();
      dragDepth += 1;
      setDraggingState(true, isAiMode ? "ai" : "main");
    });

    document.addEventListener("dragover", (event) => {
      if (hasImageFiles(event)) {
        event.preventDefault();
      }
    });

    document.addEventListener("dragleave", (event) => {
      if (!hasImageFiles(event)) {
        return;
      }

      dragDepth = Math.max(0, dragDepth - 1);

      if (dragDepth === 0) {
        setDraggingState(false);
      }
    });

    document.addEventListener("drop", (event) => {
      if (!hasImageFiles(event)) {
        return;
      }

      event.preventDefault();
      dragDepth = 0;
      setDraggingState(false);
      handleImageFile(
        [...event.dataTransfer.files].find((file) => file.type.startsWith("image/")),
        isAiMode ? "ai" : "main"
      );
    });

    underSquare.addEventListener("click", () => {
      if (currentTargetLink && linkForm.classList.contains("is-qr-ready")) {
        window.open(currentTargetLink, "_blank", "noopener");
      }
    });

    linkForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (isQrBusy) {
        return;
      }

      const link = normalizeLink(linkInput.value);

      if (!link) {
        return;
      }

      isQrBusy = true;
      setQrControlsDisabled(true);
      linkInput.value = link;
      currentTargetLink = link;

      currentQrUrl = buildQrUrl(link);
      linkForm.classList.remove("is-submitted", "is-qr-ready");
      linkForm.classList.add("is-generating");

      await Promise.all([
        delay(1000),
        preloadQrImage(currentQrUrl),
      ]);

      linkForm.classList.remove("is-generating");
      linkForm.classList.add("is-submitted", "is-qr-ready");
      setQrControlsDisabled(false);
      isQrBusy = false;
    });

    clearQr.addEventListener("click", async () => {
      await playClearQrAnimation();
    });

    downloadQr.addEventListener("click", async () => {
      if (!currentQrUrl || isQrBusy) {
        return;
      }

      downloadQr.classList.add("is-success");
      await downloadPng(currentQrUrl);
      setTimeout(() => downloadQr.classList.remove("is-success"), 2000);
    });
  </script>
